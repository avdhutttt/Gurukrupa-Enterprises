<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Gurukrupa Enterprises logo">
  <defs>
    <linearGradient id="lg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="200" cy="200" r="180" fill="url(#lg)" />

  <!-- Subtle inner highlight -->
  <circle cx="150" cy="140" r="90" fill="#ffffff" opacity="0.06" />

  <!-- Simple printer / paper motif -->
  <g transform="translate(200,150)" filter="none">
    <rect x="-60" y="-28" width="120" height="56" rx="10" fill="#ffffff" opacity="0.12" />
    <rect x="-48" y="-18" width="96" height="36" rx="6" fill="#ffffff" opacity="0.18" />
    <rect x="-28" y="2" width="56" height="12" rx="3" fill="#ffffff" />
    <rect x="-36" y="6" width="72" height="4" rx="2" fill="#ffffff" opacity="0.9" />
  </g>

  <!-- Letters GE - centered -->
  <text x="200" y="320" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="72" fill="#ffffff" letter-spacing="2">GE</text>

  <!-- Optional thin border ring -->
  <circle cx="200" cy="200" r="188" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" />
</svg>
